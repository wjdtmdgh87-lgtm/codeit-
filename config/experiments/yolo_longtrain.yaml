experiment_name: yolo_longtrain

seed: 42

model:
  weights: yolov8s.pt

data:
  image_dir: ~/Downloads/sprint_ai_project1_data/train_images
  annotation_dir: ~/Downloads/sprint_ai_project1_data/train_annotations
  val_size: 0.2
  copy_mode: copy

training:
  imgsz: 960
  batch_size: 16
  epochs: 150
  patience: 30
  workers: 2
  optimizer: auto
  lr0: 0.003
  lrf: 0.01
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 10.0
  translate: 0.05
  scale: 0.25
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.2
  cache: false